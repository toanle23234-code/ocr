services:
  - type: web
    name: prescription-ocr-backend
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-vie libgl1 && pip install -r requirements.txt
    startCommand: python -m gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_BACKEND
        value: sqlite
      - key: FLASK_ENV
        value: production
      - key: ALLOW_DEV_OTP_FALLBACK
        value: false
